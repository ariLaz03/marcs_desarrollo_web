<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Compras - Luxury Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-dark: #000000; --bg-panel: #111111; --text-light: #ffffff; --text-muted-custom: #888888; --accent-neon: #ccff00; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .navbar-top { background-color: var(--bg-dark); border-bottom: 1px solid #222; }
        .navbar-brand { letter-spacing: 2px; }
        .card-dark { background-color: var(--bg-panel); border: 1px solid #222; border-radius: 0; }
        .text-neon { color: var(--accent-neon) !important; }
        .section-divider { width: 40px; height: 2px; background-color: var(--accent-neon); margin: 0 0 30px 0; }
        .badge-success-custom { background-color: #198754; color: white; letter-spacing: 1px; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <div class="navbar-top py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-white fw-bold fs-3" href="index.html">ZENTRA_STORE</a>
            <div class="d-flex gap-4 fs-5 align-items-center">
                <a href="index.html" class="text-white text-decoration-none small border-bottom border-white fs-6">Volver a la tienda</a>
            </div>
        </div>
    </div>

    <div class="container my-5 flex-grow-1">
        <h2 class="fw-bold text-uppercase mb-3">Historial de Compras</h2>
        <div class="section-divider"></div>

        <div class="row justify-content-center">
            <div class="col-lg-8" id="contenedor-historial">
                </div>
        </div>
    </div>

    <footer class="bg-black text-muted-custom text-center py-4 border-top border-dark mt-auto">
        <p class="mb-0 small">&copy; 2026 ZENTRA_STORE. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const contenedor = document.getElementById('contenedor-historial');
            // Traemos el historial de la memoria del navegador
            const historial = JSON.parse(localStorage.getItem('historialCompras')) || [];

            if (historial.length === 0) {
                // Si está vacío
                contenedor.innerHTML = `
                    <div class="text-center py-5">
                        <span class="fs-1 mb-3 d-block">🛍️</span>
                        <h5 class="fw-bold">Aún no has realizado ninguna compra</h5>
                        <p class="text-muted-custom">Explora nuestro catálogo y descubre increíbles productos.</p>
                        <a href="productos.html" class="btn btn-outline-light mt-3 px-4 rounded-0 fw-bold">VER PRODUCTOS</a>
                    </div>
                `;
            } else {
                // Si hay compras, las dibujamos una por una
                let codigoHtml = '';
                historial.forEach(compra => {
                    codigoHtml += `
                    <div class="card card-dark p-3 mb-4 shadow-sm">
                        <div class="d-flex flex-column flex-sm-row align-items-sm-center">
                            <img src="${compra.imagen}" alt="Producto" style="width: 100px; height: 100px; object-fit: cover;" class="border border-secondary mb-3 mb-sm-0">
                            <div class="ms-sm-4 flex-grow-1">
                                <h5 class="fw-bold text-uppercase mb-1">${compra.producto}</h5>
                                <p class="text-muted-custom small mb-2">${compra.detalles}</p>
                                <span class="small text-neon fw-bold">✓ Pedido el ${compra.fecha}</span>
                            </div>
                            <div class="text-start text-sm-end mt-3 mt-sm-0 border-start border-secondary ps-sm-4">
                                <h4 class="fw-bold text-light mb-2">${compra.precio}</h4>
                                <span class="badge badge-success-custom p-2 px-3 rounded-0">ENTREGADO</span>
                            </div>
                        </div>
                    </div>`;
                });
                contenedor.innerHTML = codigoHtml;
            }
        });
    </script>
</body>
</html>
